name: Deploy Plugin to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Download the repo code
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. Upload files to cPanel through FTP
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          port: ${{ secrets.CPANEL_PORT }}
          # Exact theme path withi the cPanel:
          server-dir: public_html/elifcenter.com/wp-content/themes/elif-center/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/src/**
            *.json
            *.md
            README.md
            tailwind.config.js
            webpack.config.js
